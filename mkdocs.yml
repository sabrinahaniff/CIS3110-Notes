site_name: CIS*3110 — Operating Systems
site_description: Operating Systems notes from the University of Guelph
site_author: Sabrina Haniff
site_url: https://sabrinahaniff.github.io/CIS3110-Notes/

docs_dir: .
site_dir: site

exclude_docs: |
  site/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: README.md
  - Notes:
    - 1. Introduction to OS: 01-introduction.md
    - 2. Processes: 02-processes.md
    - 3. CPU Scheduling: 03-cpu-scheduling.md
    - 4. Synchronization: 04-synchronization.md
    - 5. Deadlock: 05-deadlock.md
    - 6. Memory Management: 06-memory-management.md
    - 7. Virtual Memory: 07-virtual-memory.md
    - 8. File Systems: 08-file-systems.md
  - Quick Reference: Quick-Reference-Guide.md
