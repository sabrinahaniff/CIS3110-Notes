site_name: CIS*3110 - Operating Systems
site_description: Operating Systems notes from the University of Guelph
site_author: Sabrina Haniff
site_url: https://sabrinahaniff.github.io/CIS3110-Notes/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: README.md
  - Notes:
    - 1. Introduction to OS: 01-introduction.md
    - 2. Processes: 02-processes.md
    - 3. CPU Scheduling: 03-cpu-scheduling.md
    - 4. Synchronization: 04-synchronization.md
    - 5. Deadlock: 05-deadlock.md
    - 6. Memory Management: 06-memory-management.md
    - 7. Virtual Memory: 07-virtual-memory.md
    - 8. File Systems: 08-file-systems.md
  - Quick Reference: Quick-Reference-Guide.md